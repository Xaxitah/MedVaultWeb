const nav = document.getElementById("nav");
const cards = document.getElementById("cards");

function render(id) {
  document.querySelectorAll(".card").forEach(c => c.classList.remove("visible"));
  document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
  document.getElementById("card-" + id).classList.add("visible");
  document.getElementById("btn-" + id).classList.add("active");
}

temas.forEach(t => {
  const btn = document.createElement("button");
  btn.id = "btn-" + t.id;
  btn.textContent = t.label;
  if (t.status === "gap") btn.classList.add("gap-btn");
  btn.onclick = () => render(t.id);
  nav.appendChild(btn);

  const tagMap = { ok: ["tag-ok", "bem coberto"], gap: ["tag-gap", "GAP crítico — estudar pelo livro"], mid: ["tag-mid", "complementar"] };
  const [tagClass, tagText] = tagMap[t.status];

  const card = document.createElement("div");
  card.className = "card";
  card.id = "card-" + t.id;
  card.innerHTML = `
    <span class="tag ${tagClass}">${tagText}</span>
    <h3>${t.id} — ${t.titulo}</h3>
    <div class="sub">Fonte: ${t.fonte}</div>
    <div class="section">
      <div class="section-title">Mnemônico / gancho</div>
      <div class="mnemo">${t.mnemo}<br><span>${t.mnemoDesc}</span></div>
    </div>
    <div class="section">
      <div class="section-title">Conceitos essenciais</div>
      <ul>${t.conceitos.map(c => `<li>${c}</li>`).join("")}</ul>
    </div>
    <hr class="divider">
    <div class="cai">
      <div class="cai-title">O que certamente cai na P1</div>
      <ul>${t.cai.map(c => `<li>${c}</li>`).join("")}</ul>
    </div>
  `;
  cards.appendChild(card);
});

render("T01");
