<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Urologia t01 infeccoes inespecificas podcast - Podcast - MedVaultWeb</title>
  <style>
    :root{--bg:#f6f8fb;--surface:#fff;--text:#182230;--muted:#667085;--line:#d9e2ec;--brand:#155e75;--brand2:#0f766e}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.6}
    header{background:linear-gradient(120deg,#164e63,#0f766e);color:#fff;padding:24px 18px}
    header .inner,main{max-width:1100px;margin:0 auto}
    h1{margin:0;font-size:1.6rem;line-height:1.25;letter-spacing:0}
    header p{margin:.4rem 0 0;opacity:.9}
    main{padding:20px 16px 52px}
    .panel{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
    .media{margin-top:14px;text-align:center}
    img{display:block;max-width:100%;height:auto;margin:0 auto;border:1px solid var(--line);border-radius:8px;background:#fff}
    .drive-player{width:100%;height:420px;border:1px solid var(--line);border-radius:8px;background:#fff}
    audio{width:100%;margin-top:12px}
    .actions{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin-top:14px}
    .btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:7px;padding:.55rem .8rem;text-decoration:none;color:#0f5f76;background:#fff;font-weight:700}
    .btn.primary{background:#155e75;color:#fff;border-color:#155e75}
    .hint,.meta{color:var(--muted);font-size:.92rem}
    code{background:#eef2f7;border-radius:4px;padding:.12rem .3rem}
  </style>
</head>
<body>
  <header><div class="inner"><h1>Urologia t01 infeccoes inespecificas podcast</h1><p>Podcast servido pelo Google Drive publico.</p></div></header>
  <main>
    <section class="panel">
      <p class="meta">Arquivo fonte: <code>https://drive.google.com/uc?id=1iKdq4JFhaRqqYjEO5AkhhZRxq2wY9rd2</code></p>
      <div class="media">
        <iframe class="drive-player" src="https://drive.google.com/file/d/1iKdq4JFhaRqqYjEO5AkhhZRxq2wY9rd2/preview" allow="autoplay"></iframe>
      <audio controls preload="metadata" src="https://drive.google.com/uc?export=download&id=1iKdq4JFhaRqqYjEO5AkhhZRxq2wY9rd2"></audio>
      <p class="hint">Se o player nao iniciar aqui, use os botoes abaixo para abrir ou baixar no Google Drive.</p>
      </div>
      <div class="actions">
        <a class="btn primary" href="https://drive.google.com/file/d/1iKdq4JFhaRqqYjEO5AkhhZRxq2wY9rd2/view" target="_blank" rel="noopener">Abrir no Drive</a>
        <a class="btn" href="https://drive.google.com/uc?export=download&id=1iKdq4JFhaRqqYjEO5AkhhZRxq2wY9rd2" target="_blank" rel="noopener">Baixar arquivo</a>
      </div>
    </section>
  </main>
</body>
</html>
